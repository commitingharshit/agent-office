name: Deploy demo to GitHub Pages

# Builds the Vite demo under docx-editor/examples/vite and publishes the
# static output to GitHub Pages at https://CasualOffice.github.io/docs/.
# Repo settings → Pages → Source must be "GitHub Actions" for this to land.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    working-directory: docx-editor

jobs:
  build:
    name: Build Vite demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # @schnsrw/design-system tokens are a submodule under
          # docx-editor/vendor/design-system; the CSS build needs them.
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build core + react libs
        run: bun run build

      # Custom domain (docs.casualoffice.org) means Pages serves at root '/',
      # not '/<repo>/'. Vite's default base = '/' is correct; no override.
      - name: Build demo (Vite)
        run: bun run build:demo

      # CNAME file pins the custom domain. GitHub auto-creates it when
      # the domain is set in Settings → Pages, but each
      # actions/deploy-pages run replaces the whole site with the
      # artifact's contents — without this step that CNAME would be
      # wiped on every deploy and the custom domain would be unset.
      - name: Write CNAME for custom domain
        run: echo 'docs.casualoffice.org' > examples/vite/dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docx-editor/examples/vite/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
