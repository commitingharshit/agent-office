name: Release (npm)

# Changesets-driven npm release flow.
#
# Pushes to `main` either:
#   - Open/update a `chore(release): version packages` PR aggregating
#     pending .changeset/*.md entries into version bumps + CHANGELOG
#     edits. Merging that PR drains the queue + re-fires this workflow
#     in publish mode.
#   - Once the queue is empty (after the release PR merges), publish
#     to npm via OIDC Trusted Publishing (no NPM_TOKEN needed).
#
# Setup (already done by the maintainer per CLAUDE.md):
#   - npmjs.com Trusted Publisher configured for each published
#     package → repo `eigenpal/docx-editor`, workflow `release-npm.yml`.
#   - .changeset/config.json sets `"access": "public"` and ignores
#     non-published packages (vue, core).
#   - Settings → Actions → General → Workflow permissions = "Read and
#     write" + "Allow GHA to create and approve PRs".
#
# Tag-driven Docker releases live in release.yml; the two flows
# don't conflict — Docker fires on tag push, this one on branch push.

on:
  # Manual trigger only. No more firing on every main merge.
  workflow_dispatch:
  # Also fire when changesets-action creates the per-package tag, or
  # when a tag is pushed manually: `git tag @casualoffice/docs@x.y.z`.
  push:
    tags:
      - '@casualoffice/docs@*'

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # Needed for the action to push commits + open PRs in the release
  # branch. Settings → Actions must also allow this at the repo level.
  contents: write
  pull-requests: write
  # OIDC Trusted Publishing — npm verifies the workflow's identity
  # without a long-lived NPM_TOKEN. The npm registry's "Publishing
  # access" page must list this workflow.
  id-token: write

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    # NODE_PASS lives as an environment secret on `dockerhub`. Attaching
    # the job to that environment is what makes `${{ secrets.NODE_PASS }}`
    # resolve to the real npm automation token. No branch policy.
    environment: dockerhub
    defaults:
      run:
        working-directory: docx-editor
    steps:
      - uses: actions/checkout@v6
        with:
          # Changesets needs full history to compute the package
          # versions correctly across the .changeset queue.
          fetch-depth: 0
          # Design-system tokens (submodule) are inlined by the CSS build.
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          # changeset publish reads .npmrc + invokes npm under the hood;
          # `npm` is available via the runner's preinstalled node.
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install --frozen-lockfile

      # Build is part of the `release` script too, but pre-building
      # here means the changesets action sees a clean `dist/` if it
      # needs to inspect the artefact before publishing.
      - name: Build core + react packages
        run: bun run build

      # Write ~/.npmrc explicitly so `changeset publish` (and any
      # shell wrapper around it) sees the auth token regardless of
      # the temp .npmrc that setup-node creates at $NPM_CONFIG_USERCONFIG.
      - name: Configure npm auth
        run: |
          cat > "$HOME/.npmrc" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NODE_PASS }}

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          cwd: docx-editor
          # When the queue is non-empty: opens/updates the release PR
          # with these bumps + CHANGELOG edits.
          version: bun run version-packages
          # When the queue is empty (post-PR-merge): publishes via
          # the `release` script (which builds + `changeset publish`).
          publish: bun run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token-based npm publish. The fork publishes under the
          # @casualoffice scope; secrets.NODE_PASS is the npm automation
          # token. (Originally CLAUDE.md described OIDC against the
          # upstream eigenpal/docx-editor repo, which doesn't apply
          # to this fork.)
          NODE_AUTH_TOKEN: ${{ secrets.NODE_PASS }}
          NPM_TOKEN: ${{ secrets.NODE_PASS }}
