<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Force the browser to revalidate index.html on every load so a new
       deploy's hashed chunk URLs are picked up the next visit. GitHub
       Pages doesn't let us set HTTP cache headers directly; the meta
       equivalents are the workaround that keeps users off stale
       chunk references after a fresh build. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Casual Editor — Word-flavored web document editor · Open source</title>
    <meta
      name="description"
      content="Open-source web .docx editor with real-time co-editing via a stateless Go gateway. ProseMirror with an OOXML-preserving model. Open a Word document, edit it in the browser, save it back as .docx. Apache-2.0 + MIT."
    />
    <meta name="author" content="Sachin Sarwa" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="color-scheme" content="light dark" />

    <!-- Self-hosted Material Symbols — offline-first, no CDN. -->
    <style>
      @font-face {
        font-family: 'Material Symbols Outlined';
        font-style: normal;
        font-weight: 100 700;
        font-display: block;
        src: url('./fonts/material-symbols-outlined.woff2') format('woff2');
      }
    </style>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Casual Editor" />
    <meta property="og:title" content="Casual Editor — Word-flavored web document editor" />
    <meta
      property="og:description"
      content="Open .docx in the browser, edit like the web, save back. Real-time co-editing via a stateless Go gateway. ProseMirror + OOXML-preserving model. Open source."
    />
    <meta property="og:url" content="https://docs.casualoffice.org/" />
    <meta property="og:image" content="https://docs.casualoffice.org/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Casual Editor — Word-flavored web document editor by Sachin Sarwa"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Casual Editor — Word-flavored web document editor" />
    <meta
      name="twitter:description"
      content="Open .docx in the browser, edit like the web, save back. Real-time co-editing. ProseMirror + OOXML-preserving model. Open source."
    />
    <meta name="twitter:image" content="https://docs.casualoffice.org/og.png" />
    <meta name="twitter:image:alt" content="Casual Editor — Word-flavored web document editor" />

    <!-- Discoverability — explicit AI-crawler opt-in lives in /robots.txt -->
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta
      name="keywords"
      content="web document editor, .docx editor, Word for the web, open-source document editor, real-time document editing, collaborative .docx, ProseMirror, OOXML, Yjs, y-prosemirror, Go gateway, stateless backend, WOPI, eigenpal docx-editor, Apache-2.0, MIT, Casual Editor, Sachin Sarwa"
    />

    <link rel="canonical" href="https://docs.casualoffice.org/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!--
    JSON-LD: SoftwareApplication + Person + WebSite.
    Google's rich-results indexer + LLM crawlers (Perplexity, ChatGPT
    web search, Claude web search) preferentially absorb structured
    data. Keep `featureList` and `screenshot` fresh.
  -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "@id": "https://docs.casualoffice.org/#app",
            "name": "Casual Editor",
            "alternateName": "casual-editor",
            "applicationCategory": "BusinessApplication",
            "applicationSubCategory": "WordProcessor",
            "operatingSystem": "Web Browser, Docker (Linux/amd64, Linux/arm64)",
            "url": "https://docs.casualoffice.org/",
            "codeRepository": "https://github.com/CasualOffice/docs",
            "license": "https://www.apache.org/licenses/LICENSE-2.0",
            "description": "Open-source, real-time collaborative .docx editor. ProseMirror with an OOXML-preserving model; React + Bun on the frontend; Go for the stateless WebSocket gateway implementing the y-websocket protocol. Document persistence is delegated to a pluggable host integration (inline for v0; WOPI / JWT-API later).",
            "image": "https://docs.casualoffice.org/og.png",
            "screenshot": "https://docs.casualoffice.org/og.png",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD",
              "availability": "https://schema.org/InStock"
            },
            "author": { "@id": "https://casualoffice.org/#person" },
            "creator": { "@id": "https://casualoffice.org/#person" },
            "publisher": { "@id": "https://casualoffice.org/#person" },
            "featureList": [
              "Open and save native .docx files",
              "Real-time multi-user co-editing via Yjs and y-prosemirror",
              "Stateless Go gateway — no DB, no on-disk update log",
              "ProseMirror with an OOXML-preserving model (forked from eigenpal/docx-editor, MIT)",
              "14-template home gallery with real first-page PNG previews",
              "Word-compat heuristics behind an opt-in flag (e.g. last-row closing border)",
              "Three-way fidelity harness vs LibreOffice and OnlyOffice DocumentBuilder",
              "Per-tag round-trip audit in CI",
              "Pluggable host integration (inline / WOPI / JWT-API behind a single Go interface)"
            ],
            "softwareRequirements": "Modern desktop browser. Docker 20+ for self-hosting the collab image.",
            "isAccessibleForFree": true,
            "keywords": "docx editor, word processor, open source, real-time, collaborative, ProseMirror, Yjs, Go, OOXML"
          },
          {
            "@type": "Person",
            "@id": "https://casualoffice.org/#person",
            "name": "Sachin Sarwa",
            "url": "https://casualoffice.org/",
            "sameAs": ["https://github.com/CasualOffice", "https://hub.docker.com/u/casualoffice"]
          },
          {
            "@type": "WebSite",
            "@id": "https://docs.casualoffice.org/#website",
            "url": "https://docs.casualoffice.org/",
            "name": "Casual Editor",
            "publisher": { "@id": "https://casualoffice.org/#person" }
          }
        ]
      }
    </script>

    <!--
      Material Symbols ships fully self-hosted via the @font-face above (a
      ~88 KB subset containing only the icon ligatures this app actually
      renders — HarfBuzz-verified coverage). The Google Fonts CDN stylesheet
      was removed: it pulled the full ~3.8 MB variable font over the network
      and registered the same `font-family`, defeating both the offline-first
      goal and the subset. Text fonts (Inter / Manrope / JetBrains Mono) are
      still loaded by the design-system tokens stylesheet.
    -->

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      /* Two view shapes share this shell:
         - Home is a TALL, normally-scrolling page (template gallery), so the
           root chain must NOT be overflow:hidden — that froze it.
         - The Editor wraps itself in a height:100vh, overflow:hidden container
           (App's styles.container) and owns its own internal scroll, so it
           stays fixed without locking the document.
         overscroll-behavior:none kills the macOS/iOS whole-page elastic
         rubber-band ("slides a bit then snaps back") WITHOUT blocking normal
         page scroll — it only disables bounce/scroll-chaining at the edges. */
      html,
      body {
        height: 100%;
        overscroll-behavior: none;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
      }
      #app {
        width: 100%;
        min-height: 100%;
      }
      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #94a3b8;
        gap: 16px;
        font-size: 14px;
      }
      .loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e2e8f0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Hide Material Symbols text until font loads */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
        visibility: hidden;
      }

      /* Show icons once font is loaded */
      .fonts-loaded .material-symbols-outlined {
        visibility: visible;
      }
    </style>

    <script>
      // Detect when Material Symbols font is loaded
      if (document.fonts) {
        document.fonts.ready.then(function () {
          document.documentElement.classList.add('fonts-loaded');
        });
        document.fonts.load('24px "Material Symbols Outlined"').then(function () {
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        setTimeout(function () {
          document.documentElement.classList.add('fonts-loaded');
        }, 500);
      }

      // Stale-deploy recovery — after a fresh build, the previous
      // index.html still points at chunks with old hashes; the first
      // navigation that lazy-loads one of those chunks gets a 404 and
      // crashes the editor. We catch the typed Vite preloadError event
      // (and the generic "Failed to fetch dynamically imported module"
      // unhandledrejection from non-Vite chunks) and force-reload the
      // page, which re-fetches index.html and the current hash refs.
      // The session-storage guard stops us from looping if the reload
      // itself fails for an unrelated reason.
      (function () {
        var KEY = 'casual:chunk-reload-at';
        function shouldReload() {
          try {
            var last = parseInt(sessionStorage.getItem(KEY) || '0', 10);
            return Date.now() - last > 20000;
          } catch (_) {
            return true;
          }
        }
        function reloadOnce() {
          try {
            sessionStorage.setItem(KEY, String(Date.now()));
          } catch (_) {}
          window.location.reload();
        }
        window.addEventListener('vite:preloadError', function (e) {
          if (!shouldReload()) return;
          e.preventDefault();
          reloadOnce();
        });
        window.addEventListener('unhandledrejection', function (e) {
          var msg = e && e.reason && (e.reason.message || String(e.reason));
          if (msg && /Failed to fetch dynamically imported module/i.test(msg) && shouldReload()) {
            reloadOnce();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>Loading editor...</span>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
